# nginx.conf — Nginx web server configuration for serving static files

server {
    # Listen on port 80 (standard HTTP port)
    listen 80;

    # Server name — matches any hostname
    server_name localhost;

    # Root directory where HTML files are located inside container
    root /usr/share/nginx/html;

    # Default file to serve when visiting root URL "/"
    index index.html;

    # Gzip compression for faster page loads
    gzip on;
    gzip_types text/css text/html text/javascript application/javascript;

    # Main location block — serves static files
    location / {
        # Try to serve the file, if not found return 404
        try_files $uri $uri/ =404;
    }

    # Cache static assets (CSS, images, JS) for 30 days
    location ~* \.(css|js|jpg|jpeg|png|gif|ico|svg)$ {
        expires 30d;
        add_header Cache-Control "public, no-transform";
    }

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN";
    add_header X-Content-Type-Options "nosniff";
}