# ─────────────────────────────────────────────
# CI Pipeline — Staging Environment
# Triggers: push to 'release' branch
# ─────────────────────────────────────────────

name: CI — Staging

on:
  push:
    branches:
      - release
  pull_request:
    branches:
      - release

jobs:

  html-validation:
    name: HTML Validation (Staging)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install HTML Validator
        run: npm install -g html-validate

      - name: Validate All HTML Files
        run: |
          html-validate index.html
          html-validate courses.html
          html-validate faculty.html
          html-validate admissions.html
          html-validate contact.html

  css-linting:
    name: CSS Linting (Staging)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Stylelint
        run: npm install -g stylelint stylelint-config-standard

      - name: Create Stylelint Config
        run: echo '{"extends":["stylelint-config-standard"]}' > .stylelintrc.json

      - name: Lint CSS Files
        run: stylelint "css/**/*.css"

  docker-build:
    name: Docker Image Build (Staging)
    runs-on: ubuntu-latest
    needs: [html-validation, css-linting]
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Build Docker Image
        run: docker build -t university-website:staging .

      - name: Test Container Starts
        run: |
          docker run -d -p 8080:80 --name test-staging university-website:staging
          sleep 3
          curl -f http://localhost:8080 || exit 1
          docker stop test-staging
          docker rm test-staging