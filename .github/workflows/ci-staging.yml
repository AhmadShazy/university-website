name: CI - Staging   # change this per file

on:
  push:
    branches: [release]   # change per file: develop / release / main
  pull_request:
    branches: [release]   # same

jobs:

  html-validation:
    name: Validate HTML
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install HTML Tidy
        run: sudo apt-get install -y tidy

      - name: Validate HTML Files
        run: |
          tidy -errors -quiet -utf8 index.html || true
          tidy -errors -quiet -utf8 courses.html || true
          tidy -errors -quiet -utf8 faculty.html || true
          tidy -errors -quiet -utf8 admissions.html || true
          tidy -errors -quiet -utf8 contact.html || true
          echo "HTML validation complete"

  css-linting:
    name: Lint CSS
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Stylelint
        run: npm install -g stylelint stylelint-config-standard

      - name: Create Stylelint Config
        run: |
          echo '{"extends":["stylelint-config-standard"],"rules":{"color-no-invalid-hex":true}}' > .stylelintrc.json

      - name: Lint CSS
        run: stylelint "css/**/*.css" || true

      - name: CSS Lint Complete
        run: echo "CSS linting complete"

  docker-build:
    name: Build Docker Image
    runs-on: ubuntu-latest
    needs: [html-validation, css-linting]
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker Image
        run: docker build -t university-website:dev .

      - name: Verify Image
        run: docker images | grep university-website