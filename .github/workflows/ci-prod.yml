# ─────────────────────────────────────────────
# CI Pipeline — Production Environment
# Triggers: push to 'main' branch
# Strictest validation — must pass to deploy
# ─────────────────────────────────────────────

name: CI — Production

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:

  html-validation:
    name: HTML Validation (Production)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install HTML Validator
        run: npm install -g html-validate

      - name: Validate All HTML Files
        run: |
          html-validate index.html
          html-validate courses.html
          html-validate faculty.html
          html-validate admissions.html
          html-validate contact.html

  css-linting:
    name: CSS Linting (Production)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Stylelint
        run: npm install -g stylelint stylelint-config-standard

      - name: Create Stylelint Config
        run: echo '{"extends":["stylelint-config-standard"]}' > .stylelintrc.json

      - name: Lint CSS Files
        run: stylelint "css/**/*.css"

  docker-build:
    name: Docker Image Build (Production)
    runs-on: ubuntu-latest
    needs: [html-validation, css-linting]
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Build Docker Image
        run: docker build -t university-website:production .

      - name: Full Container Health Check
        run: |
          docker run -d -p 8080:80 --name test-prod university-website:production
          sleep 5
          curl -f http://localhost:8080 || exit 1
          curl -f http://localhost:8080/courses.html || exit 1
          curl -f http://localhost:8080/faculty.html || exit 1
          docker stop test-prod
          docker rm test-prod

      - name: Confirm Build Success
        run: echo "✅ Production Docker image verified and ready for deployment"