# ─────────────────────────────────────────────
# CD Pipeline — Staging Deployment
# Triggers: after CI passes on 'release'
# ─────────────────────────────────────────────

name: CD — Staging Deploy

on:
  workflow_run:
    workflows: ["CI — Staging"]
    types:
      - completed
    branches:
      - release

jobs:
  deploy:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    environment: staging

    if: ${{ github.event.workflow_run.conclusion == 'success' }}

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Trigger Render Staging Deployment
        run: |
          curl -X POST "${{ secrets.RENDER_DEPLOY_HOOK_STAGING }}"

      - name: Staging Deployment Notification
        run: echo "✅ Staging environment deployed successfully!"