# ─────────────────────────────────────────────
# CI Pipeline — Development Environment
# Triggers: push to 'develop' branch
# Jobs: HTML lint, CSS lint, Docker build
# ─────────────────────────────────────────────

name: CI — Development

# TRIGGER: Run this workflow when code is pushed to 'develop'
on:
  push:
    branches:
      - develop
  pull_request:
    branches:
      - develop

# JOBS: Define what to do
jobs:

  # ── JOB 1: Validate HTML ──────────────────
  html-validation:
    name: HTML Validation
    runs-on: ubuntu-latest        # Use GitHub-hosted Ubuntu runner

    steps:
      # Step 1: Download the code from GitHub
      - name: Checkout Repository
        uses: actions/checkout@v4

      # Step 2: Install Node.js (needed for HTML validator)
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      # Step 3: Install html-validate tool globally
      - name: Install HTML Validator
        run: npm install -g html-validate

      # Step 4: Run validator on all HTML files
      - name: Validate HTML Files
        run: |
          html-validate index.html
          html-validate courses.html
          html-validate faculty.html
          html-validate admissions.html
          html-validate contact.html

  # ── JOB 2: Lint CSS ───────────────────────
  css-linting:
    name: CSS Linting
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      # Install stylelint — CSS linter
      - name: Install Stylelint
        run: npm install -g stylelint stylelint-config-standard

      # Create stylelint config file on the fly
      - name: Create Stylelint Config
        run: |
          echo '{"extends":["stylelint-config-standard"]}' > .stylelintrc.json

      # Run stylelint on all CSS files
      - name: Lint CSS Files
        run: stylelint "css/**/*.css"

  # ── JOB 3: Docker Build ───────────────────
  docker-build:
    name: Docker Image Build
    runs-on: ubuntu-latest
    needs: [html-validation, css-linting]   # Only run if both jobs above pass

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      # Build Docker image (just verify it builds — don't push yet)
      - name: Build Docker Image
        run: docker build -t university-website:dev .

      # Verify the image was created
      - name: Verify Docker Image
        run: docker images | grep university-website